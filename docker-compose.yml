version: '3.8'

services:
  app-checker:
    build: .
    volumes:
      - .:/app

  firebase-emulator:
    image: andreysenov/firebase-tools:latest
    ports:
      - "4000:4000"
      - "8080:8080"
      - "9099:9099"
    volumes:
      - .:/home/node/app

    command: firebase emulators:start --project recipebook-b5aca

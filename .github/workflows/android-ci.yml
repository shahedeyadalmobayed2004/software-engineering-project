name: Android CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop", "feature/**" ]
  pull_request:
    branches: [ "main", "develop" ]

defaults:
  run:
    working-directory: ./android-app
    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 1. فحص جودة الكود والتصميم (Lint)
      - name: Run Lint
        run: ./gradlew lintDebug

      # 2. رفع تقرير الـ Lint (سيظهر لكِ في GitHub Actions في حال فشل الفحص)
      - name: Upload Lint Report
        if: always() # نرفعه دائماً لنعرف سبب المشكلة حتى لو فشل الـ Pipeline
        uses: actions/upload-artifact@v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-debug.html

      # 3. تشغيل اختبارات الوحدة (Logic Testing)
      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      # 4. بناء التطبيق النهائي
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 5. رفع ملف الـ APK للتجربة
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RecipeBook-Debug-APK
          path: app/build/outputs/apk/debug/app-debug.apk